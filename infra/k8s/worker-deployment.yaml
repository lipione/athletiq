apiVersion: apps/v1
kind: Deployment
metadata:
  name: athletiq-worker
  labels:
    app.kubernetes.io/name: athletiq-worker
    app.kubernetes.io/part-of: athletiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: athletiq-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athletiq-worker
        app.kubernetes.io/part-of: athletiq
        app.kubernetes.io/version: replace-me
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/athletiq-worker:replace-me
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: athletiq-worker-secrets
                  key: redis-url
            - name: ATHLETIQ_RELEASE_SHA
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
