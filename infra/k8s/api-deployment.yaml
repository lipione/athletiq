apiVersion: apps/v1
kind: Deployment
metadata:
  name: athletiq-api
  labels:
    app.kubernetes.io/name: athletiq-api
    app.kubernetes.io/part-of: athletiq
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: athletiq-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athletiq-api
        app.kubernetes.io/part-of: athletiq
        app.kubernetes.io/version: replace-me
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/athletiq-api:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: '4000'
            - name: ATHLETIQ_DATA_BACKEND
              value: postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: athletiq-api-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: athletiq-api-secrets
                  key: redis-url
            - name: ATHLETIQ_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: athletiq-api-secrets
                  key: jwt-secret
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: ATHLETIQ_RELEASE_SHA
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
          readinessProbe:
            httpGet:
              path: /api/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: athletiq-api
  labels:
    app.kubernetes.io/name: athletiq-api
    app.kubernetes.io/part-of: athletiq
spec:
  selector:
    app.kubernetes.io/name: athletiq-api
  ports:
    - name: http
      port: 4000
      targetPort: http
