apiVersion: apps/v1
kind: Deployment
metadata:
  name: athletiq-web
  labels:
    app.kubernetes.io/name: athletiq-web
    app.kubernetes.io/part-of: athletiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: athletiq-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athletiq-web
        app.kubernetes.io/part-of: athletiq
        app.kubernetes.io/version: replace-me
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/athletiq-web:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: WEB_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: athletiq-web-config
                  key: web-public-api-url
            - name: ATHLETIQ_RELEASE_SHA
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: athletiq-web
  labels:
    app.kubernetes.io/name: athletiq-web
    app.kubernetes.io/part-of: athletiq
spec:
  selector:
    app.kubernetes.io/name: athletiq-web
  ports:
    - name: http
      port: 3000
      targetPort: http
